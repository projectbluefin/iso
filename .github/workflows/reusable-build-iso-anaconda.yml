---
name: Reusable Build
"on":
  workflow_call:
    inputs:
      image_version:
        description: 'Which image version to build'
        type: string
        required: true
      image_tag:
        description: 'Image tag to build from'
        type: string
        default: lts
      upload_artifacts:
        description: 'Upload ISOs as job artifacts'
        type: boolean
        default: false
      upload_r2:
        description: 'Upload ISOs to Cloudflare R2'
        type: boolean
        default: true
    secrets:
      R2_ACCESS_KEY_ID_2025:
        required: false
      R2_SECRET_ACCESS_KEY_2025:
        required: false
      R2_ENDPOINT_2025:
        required: false
  pull_request:
    paths:
      - ".github/workflows/reusable-build-iso-anaconda.yml"
      - "iso_files/configure_iso_anaconda.sh"

env:
  IMAGE_REGISTRY: "ghcr.io/ublue-os"
  IMAGE_NAME: "bluefin"

jobs:
  # Define which variants to build based on input
  # This job ensures strict separation: each image_version builds ONLY its own ISOs
  determine-matrix:
    name: Determine Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set Matrix
        id: set-matrix
        run: |
          # Define the matrix based on the input selection
          # When called via workflow_call, the image_version input determines which ISOs to build
          # Each variant builds ONLY its own specific ISOs - no cross-contamination
          # NOTE: Check if inputs.image_version is provided (indicates workflow_call)
          # rather than checking github.event_name, which may not be reliable
          if [[ -n "${{ inputs.image_version }}" ]]; then
            case "${{ inputs.image_version }}" in
              "lts")
                # LTS variant: builds ONLY LTS ISOs (4 total)
                matrix='{"include":[
                  {"platform":"amd64","flavor":"main","image_version":"lts"},
                  {"platform":"arm64","flavor":"main","image_version":"lts"},
                  {"platform":"amd64","flavor":"gdx","image_version":"lts"},
                  {"platform":"arm64","flavor":"gdx","image_version":"lts"}
                ]}'
                ;;
              "lts-hwe")
                # LTS-HWE variant: builds ONLY LTS-HWE ISOs (2 total)
                matrix='{"include":[
                  {"platform":"amd64","flavor":"main","image_version":"lts-hwe"},
                  {"platform":"arm64","flavor":"main","image_version":"lts-hwe"}
                ]}'
                ;;
              "stable")
                # Stable variant: builds ONLY Stable ISOs (2 total)
                matrix='{"include":[
                  {"platform":"amd64","flavor":"main","image_version":"stable"},
                  {"platform":"amd64","flavor":"nvidia-open","image_version":"stable"}
                ]}'
                ;;
              "all")
                # "all" is reserved for testing - builds all variants
                matrix='{"include":[
                  {"platform":"amd64","flavor":"main","image_version":"stable"},
                  {"platform":"amd64","flavor":"nvidia-open","image_version":"stable"},
                  {"platform":"amd64","flavor":"main","image_version":"lts"},
                  {"platform":"arm64","flavor":"main","image_version":"lts"},
                  {"platform":"amd64","flavor":"gdx","image_version":"lts"},
                  {"platform":"arm64","flavor":"gdx","image_version":"lts"},
                  {"platform":"amd64","flavor":"main","image_version":"lts-hwe"},
                  {"platform":"arm64","flavor":"main","image_version":"lts-hwe"}
                ]}'
                ;;
            esac
          else
            # Default for when image_version is not provided (e.g., pull_request triggers)
            # Build Stable only for faster PR validation
            matrix='{"include":[
              {"platform":"amd64","flavor":"main","image_version":"stable"},
              {"platform":"amd64","flavor":"nvidia-open","image_version":"stable"}
            ]}'
          fi

          # Compact the JSON and output it
          compact_matrix=$(echo "$matrix" | jq -c .)
          echo "matrix=$compact_matrix" >> $GITHUB_OUTPUT
          echo "Generated matrix:"
          echo "$matrix" | jq .

  build:
    name: Build ISOs
    runs-on: ${{ matrix.platform == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    needs: determine-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.determine-matrix.outputs.matrix) }}
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Install dependencies
        if: matrix.platform == 'arm64'
        run: |
          set -x
          sudo apt update -y
          sudo apt install -y \
            podman

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Setup Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

      - name: Check Just Syntax
        shell: bash
        run: |
          just check

      - name: Format image ref
        id: image_ref
        env:
          FLAVOR: ${{ matrix.flavor }}
        run: |
          set -eoux pipefail
          # Standard variants use the Just recipe to determine image name
          image_name=$(just image_name "bluefin" "${{ matrix.image_version}}" "${{ matrix.flavor}}")
          image_ref="${IMAGE_REGISTRY}/${image_name}"
          effective_tag="${{ inputs.image_tag || matrix.image_version }}"
          artifact_format="$image_name-${effective_tag}-$(uname -m)"
          KARGS="NONE"
          echo "image_ref=$image_ref" >> "${GITHUB_OUTPUT}"
          echo "artifact_format=$artifact_format" >> "${GITHUB_OUTPUT}"
          echo "kargs=$KARGS" >> "${GITHUB_OUTPUT}"

      - name: Generate titanoboa-compatible file list
        id: flatpak_list
        run: |
          set -eoux pipefail
          FILE_LIST="$(mktemp)"
          git clone https://github.com/projectbluefin/common.git common
          find common -iname "*system-flatpaks.Brewfile" -exec cat '{}' ';' | grep -v '#' | grep -F -e "flatpak" | sed 's/flatpak //' | tr -d '"' | tee "${FILE_LIST}"
          echo "file_list_path=${FILE_LIST}" | tee "${GITHUB_OUTPUT}"

      - name: Build ISO
        id: build
        uses: ublue-os/titanoboa@main
        with:
          image-ref: ${{ steps.image_ref.outputs.image_ref }}:${{ inputs.image_tag || matrix.image_version }}
          flatpaks-list: ${{ steps.flatpak_list.outputs.file_list_path }}
          hook-post-rootfs: ${{ (matrix.image_version == 'lts' || matrix.image_version == 'lts-hwe') && format('{0}/iso_files/configure_lts_iso_anaconda.sh', github.workspace) || format('{0}/iso_files/configure_iso_anaconda.sh', github.workspace) }}
          kargs: ${{ steps.image_ref.outputs.kargs }}
          builder-distro: ${{ (matrix.image_version == 'lts' || matrix.image_version == 'lts-hwe') && 'centos' || 'fedora' }}

      - name: Rename ISO
        id: rename
        env:
          OUTPUT_PATH: ${{ steps.build.outputs.iso-dest }}
          FLAVOR: ${{ matrix.flavor }}
          OUTPUT_NAME: ${{ steps.image_ref.outputs.artifact_format }}
          IMAGE_VERSION: ${{ matrix.image_version }}
        run: |
          set -x
          mkdir -p output
          OUTPUT_DIRECTORY="$(realpath output)"
          mv "${OUTPUT_PATH}" "${OUTPUT_DIRECTORY}/${OUTPUT_NAME}.iso"
          (cd "${OUTPUT_DIRECTORY}" && sha256sum "${OUTPUT_NAME}.iso" | tee "${OUTPUT_NAME}.iso-CHECKSUM")
          echo "output_directory=$OUTPUT_DIRECTORY" >> "${GITHUB_OUTPUT}"

      - name: Generate Torrent File
        env:
          OUTPUT_DIRECTORY: ${{ steps.rename.outputs.output_directory }}
          OUTPUT_NAME: ${{ steps.image_ref.outputs.artifact_format }}
          IMAGE_VERSION: ${{ matrix.image_version }}
          FLAVOR: ${{ matrix.flavor }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -eoux pipefail

          sudo apt-get install -y mktorrent

          BUILD_DATE=$(date -u +%Y-%m-%d)

          cd "${OUTPUT_DIRECTORY}"
          mktorrent \
            -a udp://tracker.opentrackr.org:1337/announce \
            -a udp://open.tracker.cl:1337/announce \
            -a udp://open.demonii.com:1337/announce \
            -a udp://tracker.openbittorrent.com:6969/announce \
            -a udp://exodus.desync.com:6969/announce \
            -a udp://tracker.torrent.eu.org:451/announce \
            -a udp://tracker.moeking.me:6969/announce \
            -a https://tracker.gbitt.info:443/announce \
            -a https://tracker.tamersunion.org:443/announce \
            -a wss://tracker.btorrent.xyz \
            -a wss://tracker.openwebtorrent.com \
            -w "https://projectbluefin.dev/${OUTPUT_NAME}.iso" \
            -w "https://download.projectbluefin.io/${OUTPUT_NAME}.iso" \
            -c "Bluefin ${IMAGE_VERSION} ${FLAVOR} (${PLATFORM}) - ${BUILD_DATE}" \
            -o "${OUTPUT_NAME}.iso.torrent" \
            "${OUTPUT_NAME}.iso"

          sha256sum "${OUTPUT_NAME}.iso.torrent" | tee "${OUTPUT_NAME}.iso.torrent-CHECKSUM"

      - name: Upload Run Torrent Artifacts
        if: inputs.upload_r2 && github.event_name != 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: torrent-${{ github.run_id }}-${{ matrix.image_version }}-${{ matrix.flavor }}-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            ${{ steps.rename.outputs.output_directory }}/${{ steps.image_ref.outputs.artifact_format }}.iso.torrent
            ${{ steps.rename.outputs.output_directory }}/${{ steps.image_ref.outputs.artifact_format }}.iso.torrent-CHECKSUM

      - name: Upload Run CHECKSUM Artifacts
        if: inputs.upload_r2 && github.event_name != 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: checksum-${{ github.run_id }}-${{ matrix.image_version }}-${{ matrix.flavor }}-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            ${{ steps.rename.outputs.output_directory }}/${{ steps.image_ref.outputs.artifact_format }}.iso-CHECKSUM

      - name: Upload to Job Artifacts
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ steps.image_ref.outputs.artifact_format }}
          if-no-files-found: error
          path: ${{ steps.rename.outputs.output_directory }}

      - name: Set up Homebrew
        if: inputs.upload_r2 && github.event_name != 'pull_request'
        uses: Homebrew/actions/setup-homebrew@8f52032f943acddc1c5670f437b94e031e78afc0 # master

      - name: Install rclone
        if: inputs.upload_r2 && github.event_name != 'pull_request'
        run: brew install rclone

      - name: Upload to CloudFlare
        if: inputs.upload_r2 && github.event_name != 'pull_request'
        shell: bash
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID_2025 }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY_2025 }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT_2025 }}
          SOURCE_DIR: ${{ steps.rename.outputs.output_directory }}
        run: |
          rclone copy --log-level INFO --checksum "${SOURCE_DIR}" R2:testing

  create-prerelease:
    name: Create GitHub Prerelease
    needs: build
    # Run when builds complete (success or partial failure) — skip only on cancellation.
    # This ensures a prerelease is published even when arm64 builds fail, so
    # the amd64 ISOs that succeeded are still available on the releases page.
    if: >-
      inputs.upload_r2 &&
      github.event_name != 'pull_request' &&
      needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Current Run Torrent Artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eoux pipefail
          mkdir -p torrents
          gh run download "${{ github.run_id }}" \
            --pattern "torrent-${{ github.run_id }}-*" \
            --dir torrents

          echo "Downloaded torrent files:"
          ls -lah torrents/

          shopt -s globstar nullglob
          torrent_files=(torrents/**/*.torrent)
          if [ ${#torrent_files[@]} -eq 0 ]; then
            echo "No torrent files found for current run"
            exit 1
          fi

      - name: Download Current Run CHECKSUM Artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eoux pipefail
          mkdir -p checksums
          gh run download "${{ github.run_id }}" \
            --pattern "checksum-${{ github.run_id }}-*" \
            --dir checksums

          echo "Downloaded checksum files:"
          ls -lah checksums/

          shopt -s globstar nullglob
          checksum_files=(checksums/**/*.iso-CHECKSUM)
          if [ ${#checksum_files[@]} -eq 0 ]; then
            echo "No ISO checksum files found for current run"
            exit 1
          fi

      - name: Determine Release Version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eoux pipefail
          YEAR_MONTH=$(date -u +%y.%m)

          if gh release view "${YEAR_MONTH}" >/dev/null 2>&1; then
            PATCH=1
            while gh release view "${YEAR_MONTH}.${PATCH}" >/dev/null 2>&1; do
              PATCH=$((PATCH + 1))
            done
            VERSION="${YEAR_MONTH}.${PATCH}"
          else
            VERSION="${YEAR_MONTH}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build Platform Status
        id: build_status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eoux pipefail
          STATUS_FILE="${RUNNER_TEMP}/build-status.md"

          # Fetch all jobs for this run and filter to the build matrix jobs
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --paginate \
            --jq '.jobs[]' > /tmp/all-jobs.json

          {
            printf '%s\n' '### Build Status'
            printf '\n'
            printf '%s\n' '| Platform | Variant | Flavor | Result |'
            printf '%s\n' '|----------|---------|--------|--------|'

            # Extract build matrix jobs — name pattern: "Build ISOs (platform, flavor, variant)"
            jq -r 'select(.name | test("Build ISOs \\(")) |
              [
                (.name | capture("Build ISOs \\((?P<platform>[^,]+), (?P<flavor>[^,]+), (?P<variant>[^)]+)\\)") | .platform, .variant, .flavor),
                .conclusion
              ] | @tsv' /tmp/all-jobs.json | sort | \
            while IFS=$'\t' read -r platform variant flavor conclusion; do
              case "$conclusion" in
                success)  icon="✅" ;;
                failure)  icon="❌" ;;
                skipped)  icon="⏭️" ;;
                *)        icon="⏳" ;;
              esac
              printf '| %s | %s | %s | %s %s |\n' "$platform" "$variant" "$flavor" "$icon" "$conclusion"
            done

            printf '\n'
            # Warn if any builds failed so readers know some ISOs may be missing
            if jq -e 'select(.name | test("Build ISOs \\(")) | select(.conclusion == "failure")' /tmp/all-jobs.json > /dev/null 2>&1; then
              printf '%s\n' '> **Note**: Some platform builds failed. Only ISOs from successful builds are attached.'
              printf '\n'
            fi
          } > "${STATUS_FILE}"

          echo "status_file=${STATUS_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_STATUS_FILE: ${{ steps.build_status.outputs.status_file }}
        run: |
          set -eoux pipefail

          shopt -s globstar nullglob
          TORRENT_FILES=(torrents/**/*.torrent torrents/**/*.torrent-CHECKSUM)
          CHECKSUM_FILES=(checksums/**/*.iso-CHECKSUM)

          if [ ${#TORRENT_FILES[@]} -eq 0 ]; then
            echo "No torrent assets available for prerelease"
            exit 1
          fi

          if [ ${#CHECKSUM_FILES[@]} -eq 0 ]; then
            echo "No ISO checksum assets available for prerelease"
            exit 1
          fi

          NOTES_FILE="${RUNNER_TEMP}/prerelease-notes.md"
          {
            printf '%s\n' '## ⚠️ Prerelease - Testing Builds'
            printf '\n'
            printf '%s\n' 'These ISOs are automatically generated from successful builds and uploaded to the **testing** bucket.'
            printf '\n'
            printf '%s\n' '**Status**: Not yet promoted to production'
            printf '%s\n' '**For**: Testing and validation only'
            printf '\n'
            printf '%s\n' 'Once validated, these builds can be promoted to production using the promotion workflow.'
            printf '\n'
            cat "${BUILD_STATUS_FILE}"
            printf '%s\n' '### How to Download'
            printf '\n'
            printf '%s\n' '1. Download a `.torrent` file below'
            printf '%s\n' '2. Open with a BitTorrent client (qBittorrent, Transmission, etc.)'
            printf '%s\n' '3. Torrents include web seeds -- downloads work immediately'
            printf '\n'
            printf '%s\n' '### Direct Downloads'
            printf '\n'
            printf '%s\n' 'ISOs are also available at https://docs.projectbluefin.io/downloads-testing'
            printf '\n'
            printf '%s\n' '### Verify'
            printf '\n'
            printf '%s\n' 'Verify your ISO download using the `.iso-CHECKSUM` files attached to this release:'
            printf '\n'
            printf '%s\n' '```bash'
            printf '%s\n' 'sha256sum -c <filename>.iso-CHECKSUM'
            printf '%s\n' '```'
            printf '\n'
            printf '%s\n' 'Verify a downloaded torrent file using the `.torrent-CHECKSUM` files:'
            printf '\n'
            printf '%s\n' '```bash'
            printf '%s\n' 'sha256sum -c <filename>.iso.torrent-CHECKSUM'
            printf '%s\n' '```'
          } > "${NOTES_FILE}"

          gh release create "${VERSION}" \
            --prerelease \
            --title "Bluefin ISOs ${VERSION} (Prerelease, run ${GITHUB_RUN_ID})" \
            --notes-file "${NOTES_FILE}" \
            "${TORRENT_FILES[@]}" \
            "${CHECKSUM_FILES[@]}"
